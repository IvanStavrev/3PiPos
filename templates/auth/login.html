{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8">
        <!-- Header -->
        <div class="text-center">
            <h2 class="text-3xl font-extrabold text-gray-900">
                3PiPos
            </h2>
            
            <!-- Language Switcher - Replaces password text -->
            <div class="mt-4 flex justify-center">
                <div class="relative group">
                    <button class="flex items-center space-x-2 text-gray-600 hover:text-gray-900 px-4 py-2 rounded-lg border border-gray-300 bg-white hover:bg-gray-50 transition duration-150 shadow-sm">
                        <i class="fas fa-globe"></i>
                        <span class="text-sm font-medium">{{ session.get('language', 'en')|upper }}</span>
                        <i class="fas fa-chevron-down text-xs"></i>
                    </button>
                    <div class="absolute hidden group-hover:block bg-white rounded-lg shadow-lg py-2 z-50 left-1/2 transform -translate-x-1/2 min-w-[120px] border border-gray-200 mt-1">
                        <a href="{{ url_for('set_language', lang='en') }}" 
                           class="block px-4 py-2 hover:bg-gray-100 text-gray-800 text-sm transition duration-150">
                            <i class="fas fa-language mr-2"></i>English
                        </a>
                        <a href="{{ url_for('set_language', lang='bg') }}" 
                           class="block px-4 py-2 hover:bg-gray-100 text-gray-800 text-sm transition duration-150">
                            <i class="fas fa-language mr-2"></i>Български
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Login Form -->
        <form class="mt-8 space-y-6" id="loginForm">
            <div class="rounded-md shadow-sm -space-y-px">
                <div>
                    <label for="password" class="sr-only">{{ translate('password') }}</label>
                    <input id="password" name="password" type="password" required 
                           class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                           placeholder="{{ translate('password') }}" autofocus>
                </div>
            </div>

            <div>
                <button type="submit" id="loginButton"
                        class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-150">
                    {{ translate('confirm') }}
                </button>
            </div>
            
            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm"></div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// Notification system
function showNotification(message, type = 'info') {
    // Create notification container if it doesn't exist
    let container = document.getElementById('notificationContainer');
    if (!container) {
        container = document.createElement('div');
        container.id = 'notificationContainer';
        container.className = 'fixed top-4 right-4 z-50 space-y-2 max-w-sm';
        document.body.appendChild(container);
    }
    
    const notificationId = 'notification-' + Date.now();
    
    const bgColor = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
    }[type];
    
    const icon = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
    }[type];
    
    const notification = document.createElement('div');
    notification.id = notificationId;
    notification.className = `${bgColor} text-white p-4 rounded-lg shadow-lg transform transition-all duration-300 ease-in-out translate-x-full`;
    notification.innerHTML = `
        <div class="flex items-center justify-between">
            <div class="flex items-center">
                <i class="fas ${icon} mr-3"></i>
                <span class="text-sm">${message}</span>
            </div>
            <button onclick="closeNotification('${notificationId}')" class="ml-4 text-white hover:text-gray-200 transition duration-150">
                <i class="fas fa-times"></i>
            </button>
        </div>
    `;
    
    container.appendChild(notification);
    
    // Animate in
    setTimeout(() => {
        notification.classList.remove('translate-x-full');
    }, 10);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        closeNotification(notificationId);
    }, 5000);
}

function closeNotification(notificationId) {
    const notification = document.getElementById(notificationId);
    if (notification) {
        notification.classList.add('translate-x-full');
        notification.classList.add('opacity-0');
        
        setTimeout(() => {
            if (notification.parentNode) {
                notification.parentNode.removeChild(notification);
            }
        }, 300);
    }
}

// Success and error shortcuts
function showSuccess(message) {
    showNotification(message, 'success');
}

function showError(message) {
    showNotification(message, 'error');
}

function showWarning(message) {
    showNotification(message, 'warning');
}

function showInfo(message) {
    showNotification(message, 'info');
}

// Login form handling
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const loginButton = document.getElementById('loginButton');
    const originalText = loginButton.textContent;
    loginButton.textContent = '{{ translate("confirm") }}...';
    loginButton.disabled = true;
    
    const formData = new FormData(this);
    
    // Add XMLHttpRequest header to identify AJAX requests
    fetch('/login', {
        method: 'POST',
        body: formData,
        headers: {
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
    .then(response => {
        // First, check if it's a redirect
        if (response.redirected) {
            window.location.href = response.url;
            return;
        }
        // Otherwise, parse as JSON
        return response.json();
    })
    .then(result => {
        if (result && result.success) {
            showSuccess('{{ translate("login_successful") }}');
            setTimeout(() => {
                window.location.href = '/';
            }, 1000);
        } else if (result && !result.success) {
            showError(result.message || '{{ translate("invalid_credentials") }}');
            // Also show in the form error div for accessibility
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = result.message || '{{ translate("invalid_credentials") }}';
            errorDiv.classList.remove('hidden');
            // Clear password field on error
            document.getElementById('password').value = '';
            document.getElementById('password').focus();
        }
    })
    .catch(error => {
        showError('{{ translate("error_occurred") }}');
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = '{{ translate("error_occurred") }}';
        errorDiv.classList.remove('hidden');
    })
    .finally(() => {
        loginButton.textContent = originalText;
        loginButton.disabled = false;
    });
});

// Focus on password field when page loads
document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('password').focus();
    
    // Close language dropdown when clicking outside
    document.addEventListener('click', function(e) {
        const languageSwitcher = document.querySelector('.relative.group');
        if (languageSwitcher && !languageSwitcher.contains(e.target)) {
            const dropdown = languageSwitcher.querySelector('.absolute');
            if (dropdown) {
                dropdown.classList.add('hidden');
            }
        }
    });
});
</script>

<style>
/* Smooth transitions for dropdown */
.relative.group:hover .absolute {
    display: block !important;
    animation: fadeIn 0.2s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Ensure dropdown stays on top */
.absolute {
    z-index: 1000;
}

/* Mobile responsiveness */
@media (max-width: 640px) {
    .min-w-\[120px\] {
        min-width: 110px;
    }
}
</style>
{% endblock %}
